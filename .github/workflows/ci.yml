name: CI Pipeline

on:
  push:
  pull_request:

jobs:
  test-and-security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov bandit

      - name: Run tests
        run: pytest --cov=.

      - name: Security scan
        run: bandit -r .
